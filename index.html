const app=document.getElementById('app');
const categorias=[...new Set(lista.map(i=>i.cat))];

categorias.forEach(cat=>{
 const sec=document.createElement('div');
 sec.className='categoria';
 sec.innerHTML=`<h2>${cat}</h2><div class="grid"></div>`;
 const grid=sec.querySelector('.grid');

 lista.filter(p=>p.cat===cat).forEach((p,i)=>{
  const id=cat+i;
  const comprado=localStorage.getItem(id);

  const card=document.createElement('div');
  card.className='card';

  if(comprado){
   card.innerHTML=`💖 Já comprado por ${comprado}`;
  }else{
   card.innerHTML=`
    <div id="main-${id}">
      <div>${p.emoji}</div>
      <h3>${p.nome}</h3>
      <div>${p.valor}</div>
      <button class="btn" onclick="abrir('${id}')">Presentear</button>
    </div>

    <div class="pix" id="pix-${id}">
      <p><b>PIX:</b> ${chavePix}</p>

      <div>
      💖 Após realizar o PIX, clique em <b>Confirmar</b> para registrar seu nome.<br>
      O presente será marcado como escolhido.
      </div>

      <input id="nome-${id}" placeholder="Seu nome">

      <button class="btn-wpp" onclick="comprar('${id}','${p.nome}')">Confirmar</button>
      <button class="btn-voltar" onclick="voltar('${id}')">Voltar</button>
    </div>
   `;
  }

  grid.appendChild(card);
 });

 app.appendChild(sec);
});

function abrir(id){
 document.getElementById('main-'+id).style.display='none';
 document.getElementById('pix-'+id).style.display='flex';
}

function voltar(id){
 document.getElementById('main-'+id).style.display='block';
 document.getElementById('pix-'+id).style.display='none';
}

function comprar(id,nomePresente){
 if(localStorage.getItem(id)){
  alert('Já foi escolhido 💖');
  return;
 }

 const nome=document.getElementById('nome-'+id).value;
 if(!nome) return alert('Digite seu nome');

 localStorage.setItem(id,nome);

 window.open(`https://wa.me/${numero}?text=${encodeURIComponent(
 'Oii, sou '+nome+' e presenteei: '+nomePresente
 )}`);

 location.reload();
}
